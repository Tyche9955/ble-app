name: Build BLE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable

      - name: Create project
        run: flutter create --org com.bleapp --project-name ble_app app

      - name: Write pubspec.yaml
        run: |
          cat > app/pubspec.yaml << 'EOF'
          name: ble_app
          description: BLE调试工具
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_blue_plus: 1.14.0
            permission_handler: ^11.0.0
            provider: ^6.1.2
          flutter:
            uses-material-design: true
          EOF

      - name: Write main.dart
        run: |
          cat > app/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          import 'scan_screen.dart';
          void main() {
            runApp(ChangeNotifierProvider(create: (_) => BleProvider(), child: const MyApp()));
          }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'BLE调试工具',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF4F46E5), brightness: Brightness.dark), useMaterial3: true),
                home: const ScanScreen(),
              );
            }
          }
          EOF

      - name: Write ble_provider.dart
        run: |
          cat > app/lib/ble_provider.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_blue_plus/flutter_blue_plus.dart';
          class BleProvider extends ChangeNotifier {
            List<ScanResult> scanResults = [];
            BluetoothDevice? connectedDevice;
            List<BluetoothService> services = [];
            BluetoothCharacteristic? selectedChar;
            List<String> logs = [];
            bool isScanning = false;
            void addLog(String msg) { logs.insert(0, '[${DateTime.now().toLocal().toString().substring(11,19)}] $msg'); if(logs.length>100)logs.removeLast(); notifyListeners(); }
            Future<void> startScan() async {
              scanResults.clear(); isScanning = true; notifyListeners(); addLog('开始扫描...');
              await FlutterBluePlus.startScan(timeout: const Duration(seconds: 8));
              FlutterBluePlus.scanResults.listen((r){scanResults=r;notifyListeners();});
              await Future.delayed(const Duration(seconds: 8));
              isScanning = false; addLog('扫描完成，发现 ${scanResults.length} 台设备'); notifyListeners();
            }
            void stopScan() { FlutterBluePlus.stopScan(); isScanning=false; notifyListeners(); }
            Future<void> connect(BluetoothDevice d) async {
              addLog('连接 ${d.platformName}...');
              try {
                await d.connect(timeout: const Duration(seconds: 10));
                connectedDevice = d; services = await d.discoverServices();
                addLog('连接成功，${services.length} 个服务');
                d.connectionState.listen((s){ if(s==BluetoothConnectionState.disconnected){connectedDevice=null;services=[];selectedChar=null;addLog('已断开');notifyListeners();}});
              } catch(e){addLog('连接失败: $e');}
              notifyListeners();
            }
            Future<void> disconnect() async { await connectedDevice?.disconnect(); connectedDevice=null;services=[];selectedChar=null;addLog('已断开');notifyListeners(); }
            void selectChar(BluetoothCharacteristic c){selectedChar=c;addLog('选择: ${c.uuid}');notifyListeners();}
            Future<void> readChar() async {
              if(selectedChar==null)return;
              try{final d=await selectedChar!.read();addLog('[读取] HEX: ${d.map((b)=>b.toRadixString(16).padLeft(2,'0')).join(' ')}');}catch(e){addLog('[错误] $e');}
            }
            Future<void> writeChar(String input) async {
              if(selectedChar==null||input.isEmpty)return;
              try{
                List<int> data;
                if(RegExp(r'^([0-9a-fA-F]{2}\s*)+$').hasMatch(input.trim())){data=List.generate(input.replaceAll(' ','').length~/2,(i)=>int.parse(input.replaceAll(' ','').substring(i*2,i*2+2),radix:16));addLog('[发送HEX] $input');}
                else{data=input.codeUnits;addLog('[发送TXT] $input');}
                await selectedChar!.write(data);addLog('发送成功 ✓');
              }catch(e){addLog('[错误] $e');}
            }
            Future<void> subscribeNotify() async {
              if(selectedChar==null)return;
              try{await selectedChar!.setNotifyValue(true);selectedChar!.onValueReceived.listen((d){addLog('[通知] ${d.map((b)=>b.toRadixString(16).padLeft(2,'0')).join(' ')}');});addLog('[订阅] ${selectedChar!.uuid}');}catch(e){addLog('[错误] $e');}
            }
          }
          EOF

      - name: Write scan_screen.dart
        run: |
          cat > app/lib/scan_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_blue_plus/flutter_blue_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          import 'device_screen.dart';
          class ScanScreen extends StatelessWidget {
            const ScanScreen({super.key});
            @override
            Widget build(BuildContext context) {
              final ble = context.watch<BleProvider>();
              return Scaffold(
                backgroundColor: const Color(0xFF0F0F1A),
                appBar: AppBar(backgroundColor: const Color(0xFF1A1A2E), title: const Text('🔵 BLE扫描', style: TextStyle(color: Colors.white))),
                body: Column(children: [
                  Padding(padding: const EdgeInsets.all(16), child: SizedBox(width: double.infinity,
                    child: ElevatedButton.icon(
                      style: ElevatedButton.styleFrom(backgroundColor: ble.isScanning?const Color(0xFFDC2626):const Color(0xFF4F46E5), padding: const EdgeInsets.symmetric(vertical:14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12))),
                      onPressed: () async {
                        if(ble.isScanning){ble.stopScan();}
                        else{await [Permission.bluetooth,Permission.bluetoothScan,Permission.bluetoothConnect,Permission.locationWhenInUse].request();ble.startScan();}
                      },
                      icon: ble.isScanning?const SizedBox(width:18,height:18,child:CircularProgressIndicator(color:Colors.white,strokeWidth:2)):const Icon(Icons.search,color:Colors.white),
                      label: Text(ble.isScanning?'停止扫描':'开始扫描',style: const TextStyle(color:Colors.white,fontSize:16)),
                    ))),
                  Expanded(child: ble.scanResults.isEmpty
                    ? Center(child: Text(ble.isScanning?'扫描中...':'点击上方按钮开始扫描',style:const TextStyle(color:Colors.grey)))
                    : ListView.builder(padding:const EdgeInsets.symmetric(horizontal:16),itemCount:ble.scanResults.length,itemBuilder:(ctx,i){
                        final r=ble.scanResults[i];
                        return Card(color:const Color(0xFF1E1E3A),margin:const EdgeInsets.only(bottom:10),shape:RoundedRectangleBorder(borderRadius:BorderRadius.circular(10)),
                          child:ListTile(
                            title:Text(r.device.platformName.isEmpty?'(未知)':r.device.platformName,style:const TextStyle(color:Colors.white,fontWeight:FontWeight.w600)),
                            subtitle:Text(r.device.remoteId.str,style:const TextStyle(color:Colors.grey,fontSize:12)),
                            trailing:Column(mainAxisAlignment:MainAxisAlignment.center,children:[Text('${r.rssi}',style:const TextStyle(color:Color(0xFF818CF8),fontWeight:FontWeight.bold)),const Text('dBm',style:TextStyle(color:Colors.grey,fontSize:10))]),
                            onTap:()async{await ble.connect(r.device);if(ble.connectedDevice!=null&&ctx.mounted)Navigator.push(ctx,MaterialPageRoute(builder:(_)=>const DeviceScreen()));},
                          ));
                      })),
                ]),
              );
            }
          }
          EOF

      - name: Write device_screen.dart
        run: |
          cat > app/lib/device_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          class DeviceScreen extends StatefulWidget {
            const DeviceScreen({super.key});
            @override State<DeviceScreen> createState()=>_DeviceScreenState();
          }
          class _DeviceScreenState extends State<DeviceScreen> {
            final _ctrl=TextEditingController();
            @override void dispose(){_ctrl.dispose();super.dispose();}
            @override
            Widget build(BuildContext context) {
              final ble=context.watch<BleProvider>();
              return Scaffold(
                backgroundColor:const Color(0xFF0F0F1A),
                appBar:AppBar(backgroundColor:const Color(0xFF1A1A2E),title:Text(ble.connectedDevice?.platformName??'设备详情',style:const TextStyle(color:Colors.white)),
                  actions:[TextButton(onPressed:()async{await ble.disconnect();if(mounted)Navigator.pop(context);},child:const Text('断开',style:TextStyle(color:Color(0xFFF87171))))]),
                body:Column(children:[
                  Expanded(flex:4,child:ListView(padding:const EdgeInsets.all(12),children:[
                    const Text('服务 & 特征值',style:TextStyle(color:Colors.grey,fontSize:12)),
                    const SizedBox(height:6),
                    ...ble.services.map((svc)=>ExpansionTile(
                      collapsedBackgroundColor:const Color(0xFF1E1E3A),backgroundColor:const Color(0xFF13131F),
                      title:Text(svc.uuid.toString(),style:const TextStyle(color:Color(0xFF818CF8),fontSize:12),overflow:TextOverflow.ellipsis),
                      children:svc.characteristics.map((c){
                        final sel=ble.selectedChar?.uuid==c.uuid;
                        return ListTile(tileColor:sel?const Color(0xFF1E3A5F):const Color(0xFF13131F),
                          title:Text(c.uuid.toString(),style:const TextStyle(color:Color(0xFFC7D2FE),fontSize:11),overflow:TextOverflow.ellipsis),
                          subtitle:Text(c.properties.toString(),style:const TextStyle(color:Colors.grey,fontSize:10)),
                          onTap:()=>ble.selectChar(c));
                      }).toList())),
                  ])),
                  Container(color:const Color(0xFF1A1A2E),padding:const EdgeInsets.all(12),child:Column(children:[
                    Row(children:[
                      Expanded(child:TextField(controller:_ctrl,style:const TextStyle(color:Colors.white),decoration:InputDecoration(hintText:'HEX(01 02)或文本',hintStyle:const TextStyle(color:Colors.grey),filled:true,fillColor:const Color(0xFF13131F),border:OutlineInputBorder(borderRadius:BorderRadius.circular(8),borderSide:BorderSide.none),contentPadding:const EdgeInsets.symmetric(horizontal:12,vertical:10)))),
                      const SizedBox(width:8),
                      ElevatedButton(style:ElevatedButton.styleFrom(backgroundColor:const Color(0xFF4F46E5)),onPressed:()=>ble.writeChar(_ctrl.text),child:const Text('发送',style:TextStyle(color:Colors.white))),
                    ]),
                    const SizedBox(height:8),
                    Row(children:[
                      Expanded(child:OutlinedButton(style:OutlinedButton.styleFrom(foregroundColor:Colors.white,side:const BorderSide(color:Color(0xFF0891B2))),onPressed:ble.readChar,child:const Text('📖 读取'))),
                      const SizedBox(width:8),
                      Expanded(child:OutlinedButton(style:OutlinedButton.styleFrom(foregroundColor:Colors.white,side:const BorderSide(color:Color(0xFF059669))),onPressed:ble.subscribeNotify,child:const Text('🔔 订阅通知'))),
                    ]),
                  ])),
                  Expanded(flex:3,child:Container(color:const Color(0xFF13131F),child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                    const Padding(padding:EdgeInsets.all(8),child:Text('日志',style:TextStyle(color:Colors.grey,fontSize:12))),
                    Expanded(child:ListView.builder(padding:const EdgeInsets.symmetric(horizontal:8),itemCount:ble.logs.length,itemBuilder:(ctx,i)=>Padding(padding:const EdgeInsets.only(bottom:4),child:Text(ble.logs[i],style:const TextStyle(color:Color(0xFFA5B4FC),fontSize:11,fontFamily:'monospace'))))),
                  ]))),
                ]),
              );
            }
          }
          EOF

      - name: Fix AndroidManifest
        run: |
          cat > app/android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <application android:label="BLE调试工具" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Get dependencies
        run: cd app && flutter pub get

      - name: Build APK
        run: cd app && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BLE-App-Release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30