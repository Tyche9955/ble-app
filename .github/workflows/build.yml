name: Build BLE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable

      - name: Create project
        run: flutter create --org com.bleapp --project-name ble_app app

      - name: Write pubspec.yaml
        run: |
          cat > app/pubspec.yaml << 'EOF'
          name: ble_app
          description: nRF BLE Tool
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_blue_plus: 1.14.0
            permission_handler: ^11.0.0
            provider: ^6.1.2
          flutter:
            uses-material-design: true
          EOF

      - name: Write main.dart
        run: |
          cat > app/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          import 'scan_screen.dart';
          void main() {
            runApp(ChangeNotifierProvider(create: (_) => BleProvider(), child: const MyApp()));
          }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'nRF BLE Tool',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFF00A9CE),
                    secondary: Color(0xFF00A9CE),
                    surface: Color(0xFF1C1C1E),
                    background: Color(0xFF000000),
                  ),
                  scaffoldBackgroundColor: const Color(0xFF000000),
                  appBarTheme: const AppBarTheme(backgroundColor: Color(0xFF1C1C1E), foregroundColor: Colors.white, elevation: 0),
                  useMaterial3: true,
                ),
                home: const ScanScreen(),
              );
            }
          }
          EOF

      - name: Write ble_provider.dart
        run: |
          cat > app/lib/ble_provider.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_blue_plus/flutter_blue_plus.dart';
          enum LogType { info, send, receive, error, success }
          class LogEntry {
            final String time, message;
            final LogType type;
            LogEntry(this.message, this.type) : time = DateTime.now().toLocal().toString().substring(11,19);
          }
          class BleProvider extends ChangeNotifier {
            List<ScanResult> scanResults = [];
            BluetoothDevice? connectedDevice;
            List<BluetoothService> services = [];
            BluetoothCharacteristic? selectedChar;
            List<LogEntry> logs = [];
            bool isScanning = false, isConnecting = false;
            void addLog(String msg, [LogType t = LogType.info]) { logs.insert(0, LogEntry(msg, t)); if(logs.length>200)logs.removeLast(); notifyListeners(); }
            Future<void> startScan() async {
              scanResults.clear(); isScanning=true; notifyListeners(); addLog('Scanning for BLE devices...');
              await FlutterBluePlus.startScan(timeout: const Duration(seconds:10));
              FlutterBluePlus.scanResults.listen((r){scanResults=r;notifyListeners();});
              await Future.delayed(const Duration(seconds:10));
              isScanning=false; addLog('Scan complete. Found ${scanResults.length} device(s)', LogType.success); notifyListeners();
            }
            void stopScan(){FlutterBluePlus.stopScan();isScanning=false;addLog('Scan stopped');notifyListeners();}
            Future<void> connect(BluetoothDevice d) async {
              isConnecting=true; notifyListeners();
              addLog('Connecting to ${d.localName.isEmpty?d.remoteId.str:d.localName}...');
              try {
                await d.connect(timeout: const Duration(seconds:10));
                connectedDevice=d; services=await d.discoverServices();
                addLog('Connected. ${services.length} service(s) discovered', LogType.success);
                d.connectionState.listen((s){if(s==BluetoothConnectionState.disconnected){connectedDevice=null;services=[];selectedChar=null;addLog('Disconnected',LogType.error);notifyListeners();}});
              } catch(e){addLog('Connection failed: $e',LogType.error);}
              isConnecting=false; notifyListeners();
            }
            Future<void> disconnect() async {await connectedDevice?.disconnect();connectedDevice=null;services=[];selectedChar=null;addLog('Disconnected');notifyListeners();}
            void selectChar(BluetoothCharacteristic c){selectedChar=c;addLog('Selected: ${c.uuid}');notifyListeners();}
            Future<void> readChar() async {
              if(selectedChar==null)return;
              try{final d=await selectedChar!.read();addLog('Read \u2190 ${d.map((b)=>b.toRadixString(16).padLeft(2,"0").toUpperCase()).join(" ")}',LogType.receive);}
              catch(e){addLog('Read error: $e',LogType.error);}
            }
            Future<void> writeChar(String input) async {
              if(selectedChar==null||input.isEmpty)return;
              try{
                List<int> data;
                if(RegExp(r'^([0-9a-fA-F]{2}\s*)+$').hasMatch(input.trim())){final h=input.replaceAll(' ','');data=List.generate(h.length~/2,(i)=>int.parse(h.substring(i*2,i*2+2),radix:16));}
                else{data=input.codeUnits;}
                await selectedChar!.write(data);
                addLog('Write \u2192 ${data.map((b)=>b.toRadixString(16).padLeft(2,"0").toUpperCase()).join(" ")}',LogType.send);
              }catch(e){addLog('Write error: $e',LogType.error);}
            }
            Future<void> subscribeNotify() async {
              if(selectedChar==null)return;
              try{
                await selectedChar!.setNotifyValue(true);
                selectedChar!.onValueReceived.listen((d){addLog('Notify \u2190 ${d.map((b)=>b.toRadixString(16).padLeft(2,"0").toUpperCase()).join(" ")}',LogType.receive);});
                addLog('Subscribed: ${selectedChar!.uuid}',LogType.success);
              }catch(e){addLog('Subscribe error: $e',LogType.error);}
            }
          }
          EOF

      - name: Write scan_screen.dart
        run: |
          cat > app/lib/scan_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_blue_plus/flutter_blue_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          import 'device_screen.dart';
          class ScanScreen extends StatelessWidget {
            const ScanScreen({super.key});
            Color _rssiColor(int r){if(r>=-60)return const Color(0xFF4CAF50);if(r>=-75)return const Color(0xFFFF9800);return const Color(0xFFF44336);}
            int _rssiBar(int r){if(r>=-60)return 4;if(r>=-70)return 3;if(r>=-80)return 2;return 1;}
            @override
            Widget build(BuildContext context) {
              final ble=context.watch<BleProvider>();
              return Scaffold(
                backgroundColor: const Color(0xFF000000),
                appBar: AppBar(
                  backgroundColor: const Color(0xFF1C1C1E),
                  title: Row(children:[Container(width:8,height:8,decoration:const BoxDecoration(color:Color(0xFF00A9CE),shape:BoxShape.circle)),const SizedBox(width:8),const Text('nRF BLE Tool',style:TextStyle(color:Colors.white,fontWeight:FontWeight.w600,fontSize:18))]),
                  actions:[if(ble.isScanning)const Padding(padding:EdgeInsets.only(right:16),child:Center(child:SizedBox(width:18,height:18,child:CircularProgressIndicator(color:Color(0xFF00A9CE),strokeWidth:2))))],
                ),
                body: Column(children:[
                  Container(color:const Color(0xFF1C1C1E),padding:const EdgeInsets.symmetric(horizontal:16,vertical:10),
                    child:Row(children:[
                      Expanded(child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                        Text(ble.isScanning?'Scanning...':'${ble.scanResults.length} device(s) found',style:const TextStyle(color:Colors.white,fontWeight:FontWeight.w500)),
                        Text(ble.isScanning?'Looking for BLE devices nearby':'Tap a device to connect',style:const TextStyle(color:Colors.grey,fontSize:12)),
                      ])),
                      GestureDetector(
                        onTap:()async{if(ble.isScanning){ble.stopScan();return;}await[Permission.bluetooth,Permission.bluetoothScan,Permission.bluetoothConnect,Permission.locationWhenInUse].request();ble.startScan();},
                        child:Container(padding:const EdgeInsets.symmetric(horizontal:16,vertical:8),decoration:BoxDecoration(color:ble.isScanning?const Color(0xFF3A3A3C):const Color(0xFF00A9CE),borderRadius:BorderRadius.circular(20)),
                          child:Text(ble.isScanning?'STOP':'SCAN',style:const TextStyle(color:Colors.white,fontWeight:FontWeight.bold,fontSize:13))),
                      ),
                    ])),
                  const Divider(height:1,color:Color(0xFF2C2C2E)),
                  Expanded(child:ble.scanResults.isEmpty
                    ?Center(child:Column(mainAxisAlignment:MainAxisAlignment.center,children:[Icon(Icons.bluetooth_searching,size:64,color:Colors.grey.shade700),const SizedBox(height:16),Text(ble.isScanning?'Scanning for devices...':'No devices found',style:TextStyle(color:Colors.grey.shade500,fontSize:16)),const SizedBox(height:8),Text(ble.isScanning?'':'Press SCAN to start',style:TextStyle(color:Colors.grey.shade700,fontSize:13))]))
                    :ListView.separated(
                      itemCount:ble.scanResults.length,
                      separatorBuilder:(_,__)=>const Divider(height:1,color:Color(0xFF2C2C2E),indent:16),
                      itemBuilder:(ctx,i){
                        final r=ble.scanResults[i];
                        final name=r.device.localName.isEmpty?'Unknown Device':r.device.localName;
                        final bars=_rssiBar(r.rssi);final rc=_rssiColor(r.rssi);
                        return InkWell(
                          onTap:()async{if(ble.isConnecting)return;await ble.connect(r.device);if(ble.connectedDevice!=null&&ctx.mounted)Navigator.push(ctx,MaterialPageRoute(builder:(_)=>const DeviceScreen()));},
                          child:Container(color:const Color(0xFF1C1C1E),padding:const EdgeInsets.symmetric(horizontal:16,vertical:12),
                            child:Row(children:[
                              SizedBox(width:32,height:32,child:Row(crossAxisAlignment:CrossAxisAlignment.end,mainAxisAlignment:MainAxisAlignment.spaceBetween,
                                children:List.generate(4,(j)=>Container(width:5,height:6.0+j*6,decoration:BoxDecoration(color:j<bars?rc:const Color(0xFF3A3A3C),borderRadius:BorderRadius.circular(2)))))),
                              const SizedBox(width:12),
                              Expanded(child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                                Text(name,style:const TextStyle(color:Colors.white,fontWeight:FontWeight.w600,fontSize:15)),
                                const SizedBox(height:2),
                                Text(r.device.remoteId.str,style:const TextStyle(color:Color(0xFF8E8E93),fontSize:12,fontFamily:'monospace')),
                              ])),
                              Column(crossAxisAlignment:CrossAxisAlignment.end,children:[
                                Text('${r.rssi} dBm',style:TextStyle(color:rc,fontSize:12,fontWeight:FontWeight.w500)),
                                const Icon(Icons.chevron_right,color:Color(0xFF3A3A3C),size:18),
                              ]),
                            ])),
                        );
                      })),
                ]),
              );
            }
          }
          EOF

      - name: Write device_screen.dart
        run: |
          cat > app/lib/device_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'ble_provider.dart';
          class DeviceScreen extends StatefulWidget {
            const DeviceScreen({super.key});
            @override State<DeviceScreen> createState()=>_DeviceScreenState();
          }
          class _DeviceScreenState extends State<DeviceScreen> with SingleTickerProviderStateMixin {
            late TabController _tabs;
            final _ctrl=TextEditingController();
            @override void initState(){super.initState();_tabs=TabController(length:2,vsync:this);}
            @override void dispose(){_tabs.dispose();_ctrl.dispose();super.dispose();}
            Color _lc(LogType t){switch(t){case LogType.send:return const Color(0xFF00A9CE);case LogType.receive:return const Color(0xFF4CAF50);case LogType.error:return const Color(0xFFF44336);case LogType.success:return const Color(0xFF4CAF50);default:return const Color(0xFF8E8E93);}}
            String _lp(LogType t){switch(t){case LogType.send:return '\u2192';case LogType.receive:return '\u2190';case LogType.error:return '\u2715';case LogType.success:return '\u2713';default:return '\u00b7';}}
            List<String> _props(c){final p=<String>[];if(c.properties.read)p.add('READ');if(c.properties.write)p.add('WRITE');if(c.properties.writeWithoutResponse)p.add('WRITE NO RSP');if(c.properties.notify)p.add('NOTIFY');if(c.properties.indicate)p.add('INDICATE');return p;}
            String _sn(String u){final s=u.toLowerCase();if(s.contains('1800'))return 'Generic Access';if(s.contains('1801'))return 'Generic Attribute';if(s.contains('180a'))return 'Device Information';if(s.contains('180f'))return 'Battery Service';if(s.contains('180d'))return 'Heart Rate';return 'Custom Service';}
            String _cn(String u){final s=u.toLowerCase();if(s.contains('2a00'))return 'Device Name';if(s.contains('2a19'))return 'Battery Level';if(s.contains('2a24'))return 'Model Number';if(s.contains('2a29'))return 'Manufacturer Name';if(s.contains('2a37'))return 'Heart Rate Measurement';return 'Custom Characteristic';}
            Widget _ab(String l,Color c,VoidCallback f)=>GestureDetector(onTap:f,child:Container(margin:const EdgeInsets.only(left:6),width:28,height:28,decoration:BoxDecoration(color:c.withOpacity(0.15),borderRadius:BorderRadius.circular(6),border:Border.all(color:c,width:1)),child:Center(child:Text(l,style:TextStyle(color:c,fontWeight:FontWeight.bold,fontSize:12)))));
            @override
            Widget build(BuildContext context) {
              final ble=context.watch<BleProvider>();
              final dn=ble.connectedDevice?.localName.isEmpty??true?ble.connectedDevice?.remoteId.str??'Device':ble.connectedDevice!.localName;
              return Scaffold(
                backgroundColor:const Color(0xFF000000),
                appBar:AppBar(
                  backgroundColor:const Color(0xFF1C1C1E),
                  leading:IconButton(icon:const Icon(Icons.arrow_back_ios,size:18),onPressed:()=>Navigator.pop(context)),
                  title:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                    Text(dn,style:const TextStyle(color:Colors.white,fontWeight:FontWeight.w600,fontSize:16)),
                    Row(children:[Container(width:6,height:6,decoration:const BoxDecoration(color:Color(0xFF4CAF50),shape:BoxShape.circle)),const SizedBox(width:4),const Text('Connected',style:TextStyle(color:Color(0xFF4CAF50),fontSize:11))]),
                  ]),
                  actions:[TextButton(onPressed:()async{await ble.disconnect();if(mounted)Navigator.pop(context);},child:const Text('DISCONNECT',style:TextStyle(color:Color(0xFFF44336),fontSize:12,fontWeight:FontWeight.bold)))],
                  bottom:TabBar(controller:_tabs,indicatorColor:const Color(0xFF00A9CE),labelColor:const Color(0xFF00A9CE),unselectedLabelColor:const Color(0xFF8E8E93),tabs:const[Tab(text:'SERVICES'),Tab(text:'LOG')]),
                ),
                body:TabBarView(controller:_tabs,children:[
                  ListView(children:[
                    ...ble.services.map((svc)=>Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                      Container(width:double.infinity,color:const Color(0xFF2C2C2E),padding:const EdgeInsets.symmetric(horizontal:16,vertical:8),
                        child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                          Text(_sn(svc.uuid.toString()),style:const TextStyle(color:Color(0xFF00A9CE),fontWeight:FontWeight.w600,fontSize:13)),
                          Text(svc.uuid.toString().toUpperCase(),style:const TextStyle(color:Color(0xFF8E8E93),fontSize:11,fontFamily:'monospace')),
                        ])),
                      ...svc.characteristics.map((c){
                        final sel=ble.selectedChar?.uuid==c.uuid;
                        return InkWell(onTap:()=>ble.selectChar(c),child:Container(
                          color:sel?const Color(0xFF00A9CE).withOpacity(0.1):const Color(0xFF1C1C1E),
                          padding:const EdgeInsets.symmetric(horizontal:16,vertical:10),
                          child:Row(children:[
                            if(sel)Container(width:3,height:40,color:const Color(0xFF00A9CE),margin:const EdgeInsets.only(right:12)),
                            Expanded(child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                              Text(_cn(c.uuid.toString()),style:TextStyle(color:sel?const Color(0xFF00A9CE):Colors.white,fontWeight:FontWeight.w500,fontSize:13)),
                              const SizedBox(height:2),
                              Text(c.uuid.toString().toUpperCase(),style:const TextStyle(color:Color(0xFF8E8E93),fontSize:10,fontFamily:'monospace')),
                              const SizedBox(height:4),
                              Wrap(spacing:4,children:_props(c).map((p)=>Container(padding:const EdgeInsets.symmetric(horizontal:6,vertical:2),decoration:BoxDecoration(color:const Color(0xFF2C2C2E),borderRadius:BorderRadius.circular(4)),child:Text(p,style:const TextStyle(color:Color(0xFF8E8E93),fontSize:10)))).toList()),
                            ])),
                            if(sel)Row(children:[
                              if(c.properties.read)_ab('R',const Color(0xFF00A9CE),ble.readChar),
                              if(c.properties.notify||c.properties.indicate)_ab('N',const Color(0xFF4CAF50),ble.subscribeNotify),
                            ]),
                          ]),
                        ));
                      }),
                      const Divider(height:1,color:Color(0xFF2C2C2E)),
                    ])),
                    if(ble.selectedChar!=null&&(ble.selectedChar!.properties.write||ble.selectedChar!.properties.writeWithoutResponse))
                      Container(color:const Color(0xFF1C1C1E),padding:const EdgeInsets.all(16),child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                        const Text('WRITE VALUE',style:TextStyle(color:Color(0xFF8E8E93),fontSize:11,fontWeight:FontWeight.w600)),
                        const SizedBox(height:8),
                        Row(children:[
                          Expanded(child:TextField(controller:_ctrl,style:const TextStyle(color:Colors.white,fontFamily:'monospace',fontSize:14),decoration:InputDecoration(hintText:'HEX (e.g. 01 02 FF) or text',hintStyle:const TextStyle(color:Color(0xFF3A3A3C)),filled:true,fillColor:const Color(0xFF2C2C2E),border:OutlineInputBorder(borderRadius:BorderRadius.circular(8),borderSide:BorderSide.none),contentPadding:const EdgeInsets.symmetric(horizontal:12,vertical:10)))),
                          const SizedBox(width:8),
                          GestureDetector(onTap:(){ble.writeChar(_ctrl.text);_ctrl.clear();},child:Container(padding:const EdgeInsets.symmetric(horizontal:16,vertical:12),decoration:BoxDecoration(color:const Color(0xFF00A9CE),borderRadius:BorderRadius.circular(8)),child:const Text('WRITE',style:TextStyle(color:Colors.white,fontWeight:FontWeight.bold,fontSize:13)))),
                        ]),
                      ])),
                  ]),
                  Column(children:[
                    Container(color:const Color(0xFF1C1C1E),padding:const EdgeInsets.symmetric(horizontal:16,vertical:8),
                      child:Row(children:[const Expanded(child:Text('Log',style:TextStyle(color:Colors.white,fontWeight:FontWeight.w600))),GestureDetector(onTap:(){ble.logs.clear();ble.notifyListeners();},child:const Text('CLEAR',style:TextStyle(color:Color(0xFF00A9CE),fontSize:12,fontWeight:FontWeight.bold)))])),
                    const Divider(height:1,color:Color(0xFF2C2C2E)),
                    Expanded(child:ble.logs.isEmpty
                      ?Center(child:Text('No log entries',style:TextStyle(color:Colors.grey.shade700)))
                      :ListView.builder(padding:const EdgeInsets.all(12),itemCount:ble.logs.length,itemBuilder:(ctx,i){
                        final l=ble.logs[i];
                        return Padding(padding:const EdgeInsets.only(bottom:6),child:Row(crossAxisAlignment:CrossAxisAlignment.start,children:[
                          Text(l.time,style:const TextStyle(color:Color(0xFF3A3A3C),fontSize:10,fontFamily:'monospace')),
                          const SizedBox(width:8),
                          Text(_lp(l.type),style:TextStyle(color:_lc(l.type),fontSize:12,fontWeight:FontWeight.bold)),
                          const SizedBox(width:6),
                          Expanded(child:Text(l.message,style:TextStyle(color:_lc(l.type),fontSize:12,fontFamily:'monospace'))),
                        ]));
                      })),
                  ]),
                ]),
              );
            }
          }
          EOF

      - name: Fix AndroidManifest
        run: |
          cat > app/android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <application android:label="nRF BLE Tool" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Get dependencies
        run: cd app && flutter pub get

      - name: Build APK
        run: cd app && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nRF-BLE-Tool
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
