name: Build BLE App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable

      - name: Create project
        run: flutter create --org com.bleapp --project-name ble_app app

      - name: Copy source files
        run: |
          cp pubspec.yaml app/pubspec.yaml
          cp main.dart app/lib/main.dart
          cp ble_manager.dart app/lib/ble_manager.dart
          cp scan_screen.dart app/lib/scan_screen.dart
          cp device_screen.dart app/lib/device_screen.dart
          mkdir -p app/android/app/src/main
          cp AndroidManifest.xml app/android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: cd app && flutter pub get

      - name: Build APK
        run: cd app && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nRF-BLE-Tool-v2
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
